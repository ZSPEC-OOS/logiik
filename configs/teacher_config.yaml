# Teacher AI API Configuration — Kimi K2.5

teacher:
  # --- Fill in your Kimi K2.5 credentials ---
  model_id: ""       # e.g. kimi-k2-5
  base_url: ""       # e.g. https://api.moonshot.cn/v1
  api_key_env: "TEACHER_API_KEY"
  # ------------------------------------------
  generation:
    temperature: 0.7
    max_tokens: 500
    response_format: "json"
  curriculum:
    topics_per_session: 5
    examples_per_topic: 20
    difficulty_range: [0.1, 0.9]
  evaluation:
    criteria:
      - accuracy
      - completeness
      - originality
      - coherence
    min_pass_score: 0.7
